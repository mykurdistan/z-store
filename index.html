<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Kurd Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a855f7; /* ڕەنگی مۆری نیۆن */
            --bg-color: #000000;      /* ڕەشی مات */
            --card-bg: #111111;       /* ڕەشی کەمێک ڕووناک بۆ لیست */
            --text-main: #ffffff;
            --text-sec: #a1a1aa;
            --glow-effect: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* ستایلی لیستەکە */
        .list-container {
            padding: 16px;
            max-width: 500px;
            margin: auto;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 16px;
            transition: 0.2s ease;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid #222;
            margin-bottom: 12px;
        }

        .list-item:active {
            transform: scale(0.98);
            background: #1a1a1a;
        }

        .list-icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            margin-left: 16px;
            object-fit: cover;
            border: 1px solid var(--primary-color);
            box-shadow: var(--glow-effect);
        }

        .list-details h2 {
            font-size: 18px;
            margin: 0;
            font-weight: 500;
        }

        .list-details p {
            font-size: 13px;
            color: var(--text-sec);
            margin: 4px 0;
        }

        /* لاپەڕەی ناوەوە (Details) */
        .details-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            overflow-y: auto;
            display: none;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .nav-bar {
            padding: 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            border-bottom: 1px solid #222;
        }

        .back-btn {
            font-size: 24px;
            margin-left: 20px;
            cursor: pointer;
            color: var(--primary-color);
        }

        .app-header {
            padding: 20px;
            display: flex;
            align-items: flex-start;
        }

        .big-icon {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            margin-left: 20px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }

        .install-btn {
            display: block;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin: 20px;
            font-size: 15px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            transition: 0.3s;
        }

        .install-btn:hover {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
        }

        /* بەشی وێنەکان */
        .screenshots {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 0 20px 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .screenshots img {
            min-width: 180px;
            height: 320px;
            border-radius: 16px;
            object-fit: cover;
            scroll-snap-align: start;
            border: 1px solid #333;
        }

        .info-section {
            padding: 20px;
            border-top: 8px solid #111;
        }

    </style>
</head>
<body>

    <div id="list-view" class="list-container">
        <h1 style="font-size: 24px; margin-bottom: 24px; color: var(--primary-color); font-weight: 700;">Z Kurd Store</h1>
        
        <div class="list-item" onclick="openDetails()">
            <img src="me.png" class="list-icon">
            <div class="list-details">
                <h2>Battery</h2>
                <p>وەشان 1.0</p>
                <div style="color: var(--primary-color); font-size: 12px; font-weight: 500;">android</div>
            </div>
        </div>
    </div>

    <div id="details-view" class="details-page">
        <div class="nav-bar">
            <span class="back-btn" onclick="closeDetails()">✕</span>
            <span style="font-weight: 700; color: var(--primary-color); font-size: 18px;">Z Kurd Store</span>
        </div>

        <div class="app-header">
            <img src="me.png" class="big-icon">
            <div style="flex: 1;">
                <h1 style="margin:0; font-size: 24px; font-weight: 500;">Battery</h1>
                <div style="color: var(--primary-color); font-weight: 500; margin-top: 4px;">زانیاری دەربارەی پاتری مۆبایلەکەت</div>
                <p style="font-size: 12px; color: var(--text-sec);">Contains Ads • 2MB</p>
            </div>
        </div>

        <a href="battery.apk" download="battery.apk" target="_blank" class="install-btn">Install</a>


        <div class="screenshots">
            <img src="a.jpg" alt="Screen 1">
            <img src="b.jpg" alt="Screen 2">
            <img src="c.jpg" alt="Screen 3">
        </div>

        <div class="info-section">
            <h3 style="margin-top: 0; color: var(--primary-color);">دەربارەی ئەپەکە</h3>
            <p style="color: var(--text-sec); font-size: 14px; line-height: 1.6;">
         ئەپێکی سادە بۆ پیشاندانی ڕێژەی بارگاویبوونی پاتری مۆبایلەکەت.
            </p>
        </div>
    </div>

    <script>
        function openDetails() {
            document.getElementById('details-view').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeDetails() {
            document.getElementById('details-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
